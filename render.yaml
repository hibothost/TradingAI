services:
  # ── Trading Bot (web service — dashboard + API) ─────────────
  - type: web
    name: ict-smc-trading-bot
    env: python
    region: oregon          # change to frankfurt/singapore if closer to your broker
    plan: starter           # use 'starter' ($7/mo) — free tier spins down after 15min
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python mt5_bot_cloud.py
    healthCheckPath: /health

    envVars:
      # ── MetaApi credentials (mark as secret in Render dashboard)
      - key: METAAPI_TOKEN
        sync: false          # set manually in Render → Environment → Secret

      - key: METAAPI_ACCOUNT_ID
        sync: false          # set manually in Render → Environment → Secret

      # ── Trading settings (safe to commit — no sensitive data)
      - key: TRADING_SYMBOL
        value: EURUSD

      - key: HTF_TIMEFRAME
        value: 4h

      - key: LTF_TIMEFRAME
        value: 15m

      - key: RISK_PCT
        value: "1.0"         # % of balance risked per trade

      - key: MIN_RR
        value: "2.0"         # minimum risk:reward ratio

      - key: MAX_TRADES
        value: "3"           # max concurrent open trades

      - key: MIN_CONFLUENCE
        value: "3"           # minimum ICT/SMC confluence score to execute

      - key: MAX_SPREAD
        value: "20"          # max spread in points

      - key: SCAN_INTERVAL
        value: "60"          # seconds between market scans
